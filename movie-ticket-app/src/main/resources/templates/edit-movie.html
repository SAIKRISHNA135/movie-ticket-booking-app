<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Edit Movie</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card p-4 shadow-lg">

                <h2 class="text-center text-dark mb-4">
                    ✏️ Edit Movie
                </h2>

                <form action="/update-movie"
                      method="post">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}" />

                    <input type="hidden"
                           name="id"
                           th:value="${movie.id}">

                    <div class="mb-3">

                        <label class="form-label text-dark">
                            Title
                        </label>

                        <input type="text"
                               name="title"
                               class="form-control"
                               th:value="${movie.title}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label text-dark">
                            Genre
                        </label>

                        <input type="text"
                               name="genre"
                               class="form-control"
                               th:value="${movie.genre}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label text-dark">
                            Duration
                        </label>

                        <input type="number"
                               name="duration"
                               class="form-control"
                               th:value="${movie.duration}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label text-dark">
                            Language
                        </label>

                        <input type="text"
                               name="language"
                               class="form-control"
                               th:value="${movie.language}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label text-dark">
                            Poster URL
                        </label>

                        <input type="text"
                               name="posterUrl"
                               class="form-control"
                               th:value="${movie.posterUrl}">

                    </div>

                    <button type="submit"
                            class="btn btn-warning w-100">

                        Update Movie

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
