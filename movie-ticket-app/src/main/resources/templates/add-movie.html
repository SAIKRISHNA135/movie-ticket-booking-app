<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add Movie</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card p-4 shadow-lg">

                <h2 class="text-center text-dark mb-4">
                    🎬 Add Movie
                </h2>

                <form action="/save-movie"
                      method="post"
                      th:object="${movie}">

                    <!-- CSRF Token -->
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}" />

                    <!-- Title -->
                    <div class="mb-3">

                        <label class="form-label text-dark">
                            Title
                        </label>

                        <input type="text"
                               th:field="*{title}"
                               class="form-control">

                        <div class="text-danger"
                             th:if="${#fields.hasErrors('title')}"
                             th:errors="*{title}">
                        </div>

                    </div>

                    <!-- Genre -->
                    <div class="mb-3">

                        <label class="form-label text-dark">
                            Genre
                        </label>

                        <input type="text"
                               th:field="*{genre}"
                               class="form-control">

                        <div class="text-danger"
                             th:if="${#fields.hasErrors('genre')}"
                             th:errors="*{genre}">
                        </div>

                    </div>

                    <!-- Duration -->
                    <div class="mb-3">

                        <label class="form-label text-dark">
                            Duration
                        </label>

                        <input type="number"
                               th:field="*{duration}"
                               class="form-control">

                        <div class="text-danger"
                             th:if="${#fields.hasErrors('duration')}"
                             th:errors="*{duration}">
                        </div>

                    </div>

                    <!-- Language -->
                    <div class="mb-3">

                        <label class="form-label text-dark">
                            Language
                        </label>

                        <input type="text"
                               th:field="*{language}"
                               class="form-control">

                        <div class="text-danger"
                             th:if="${#fields.hasErrors('language')}"
                             th:errors="*{language}">
                        </div>

                    </div>

                    <!-- Poster URL -->
                    <div class="mb-3">

                        <label class="form-label text-dark">
                            Poster URL
                        </label>

                        <input type="text"
                               th:field="*{posterUrl}"
                               class="form-control">

                    </div>

                    <!-- Submit Button -->
                    <button type="submit"
                            class="btn btn-warning w-100">

                        Save Movie

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
