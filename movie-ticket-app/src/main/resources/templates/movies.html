<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Movies</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-dark text-white">

<nav class="navbar navbar-expand-lg navbar-dark bg-black">
    <div class="container">

        <a class="navbar-brand" href="#">
            🎬 Movie Booking App
        </a>

        <a class="btn btn-warning"
           href="/add-movie">
            Add Movie
        </a>

    </div>
</nav>

<div class="container mt-5">

    <h1 class="mb-4 text-center">
        Now Showing
    </h1>

    <form action="/search"
          method="get"
          class="mb-4">

        <div class="input-group">

            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Search movies...">

            <button class="btn btn-warning"
                    type="submit">

                Search

            </button>

        </div>

    </form>

    <div class="row">

        <div class="col-md-4 mb-4"
             th:each="movie : ${movies}">

            <div class="card h-100 shadow-lg">

                <img th:src="${movie.posterUrl}"
                     class="card-img-top"
                     alt="Movie Poster"
                     style="height: 400px;
                object-fit: cover;">

                <div class="card-body text-dark">

                    <h3 class="card-title"
                        th:text="${movie.title}">
                    </h3>

                    <p>
                        <strong>Genre:</strong>
                        <span th:text="${movie.genre}"></span>
                    </p>

                    <p>
                        <strong>Duration:</strong>
                        <span th:text="${movie.duration}"></span>
                        mins
                    </p>

                    <p>
                        <strong>Language:</strong>
                        <span th:text="${movie.language}"></span>
                    </p>

                    <div class="d-flex gap-2">

                        <a th:href="@{/edit/{id}(id=${movie.id})}"
                           class="btn btn-primary">

                            Edit

                        </a>

                        <a th:href="@{/delete/{id}(id=${movie.id})}"
                           class="btn btn-danger">

                            Delete

                        </a>

                    </div>

                </div>

            </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
